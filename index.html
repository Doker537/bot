<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Debugger Pro</title>
    <style>
        /* Стиль остается прежним (из предыдущего ответа), добавляем только индикатор сохранения */
        :root {
            --bg-color: #0b0f19; --surface-color: #111827; --border-color: #1f2937;
            --text-main: #f3f4f6; --text-muted: #9ca3af; --accent-blue: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4); --error-red: #ef4444; --success-green: #10b981;
            --font-ui: system-ui, sans-serif; --font-code: 'JetBrains Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-ui); padding: 2rem 1rem; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 3rem; }
        .progress-bar { position: sticky; top: 1rem; background: var(--surface-color); border: 1px solid var(--border-color); padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); margin-bottom: 2rem; font-family: var(--font-code); }
        .task-card { background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 4px; padding: 1.5rem; margin-bottom: 1.5rem; transition: all 0.3s ease; }
        .task-card.success { border-color: var(--success-green); opacity: 0.8; }
        .task-header { margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 2px; background: #374151; }
        .status-badge.correct { background: var(--success-green); }
        .workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        pre, textarea { font-family: var(--font-code); font-size: 0.9rem; padding: 1rem; background: #000; border: 1px solid var(--border-color); border-radius: 4px; color: #e5e7eb; width: 100%; height: 120px; }
        .btn { background: var(--surface-color); color: var(--text-main); border: 1px solid var(--border-color); padding: 0.6rem 1.2rem; cursor: pointer; border-radius: 2px; }
        .btn:hover { background: var(--accent-blue); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .final-form { background: var(--surface-color); border: 1px solid var(--border-color); padding: 2rem; margin-top: 3rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group input { width: 100%; padding: 0.8rem; background: #000; border: 1px solid var(--border-color); color: #fff; }
        .btn-submit { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 1rem; font-weight: bold; cursor: pointer; }
        @media (max-width: 768px) { .workspace { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Python Debugger <span style="font-size: 0.5em; vertical-align: middle; color: var(--accent-blue);">PERSISTENT</span></h1>
        <p style="color: var(--text-muted)">Ваш прогресс сохраняется автоматически.</p>
    </header>

    <div class="progress-bar">
        <span>Прогресс:</span>
        <span id="score-counter">0 / 20</span>
    </div>

    <div id="tasks-container"></div>

    <div class="final-form">
        <h2>Отправить результат</h2>
        <form id="results-form">
            <div class="form-group"><input type="text" id="firstName" required placeholder="Имя"></div>
            <div class="form-group"><input type="text" id="lastName" required placeholder="Фамилия"></div>
            <button type="submit" id="submit-btn" class="btn-submit">ОТПРАВИТЬ В VK</button>
        </form>
    </div>
</div>

<script>
const tasks = [
        // --- Базовый уровень (1-20) ---
    { id: 1, type: "Синтаксис", bad: 'print("Hi"', good: 'print("Hi")' },
    { id: 2, type: "Синтаксис", bad: 'if x > 1\n    print(x)', good: 'if x > 1:\n    print(x)' },
    { id: 3, type: "Отступы", bad: 'for i in range(3):\nprint(i)', good: 'for i in range(3):\n    print(i)' },
    { id: 4, type: "Переменные", bad: 'age = 20\nprint(Age)', good: 'age = 20\nprint(age)' },
    { id: 5, type: "Списки", bad: 'nums = [1 2]', good: 'nums = [1, 2]' },
    { id: 6, type: "Строки", bad: 'name = John', good: 'name = "John"' },
    { id: 7, type: "Условия", bad: 'if x = 5:\n    pass', good: 'if x == 5:\n    pass' },
    { id: 8, type: "Циклы", bad: 'while True\n    break', good: 'while True:\n    break' },
    { id: 9, type: "Функции", bad: 'def hello\n    print("Hi")', good: 'def hello():\n    print("Hi")' },
    { id: 10, type: "Булевы", bad: 'flag = false', good: 'flag = False' },
    { id: 11, type: "Операторы", bad: 'x = 1\nx =+ 2', good: 'x = 1\nx += 2' },
    { id: 12, type: "Ввод", bad: 'num = input()\nprint(num + 1)', good: 'num = int(input())\nprint(num + 1)' },
    { id: 13, type: "Словари", bad: 'd = {"a" 1}', good: 'd = {"a": 1}' },
    { id: 14, type: "Индексы", bad: 'arr = [5]\nprint(arr[1])', good: 'arr = [5]\nprint(arr[0])' },
    { id: 15, type: "Методы", bad: 'text = "hi"\ntext.upper', good: 'text = "hi"\ntext.upper()' },
    { id: 16, type: "Типы", bad: 'print("2" + 2)', good: 'print("2" + str(2))' },
    { id: 17, type: "Импорты", bad: 'import math.sqrt', good: 'from math import sqrt' },
    { id: 18, type: "None", bad: 'x = None\nif x == None:\n    pass', good: 'x = None\nif x is None:\n    pass' },
    { id: 19, type: "Кортежи", bad: 't = (1,2)\nt[0] = 5', good: 't = [1,2]\nt[0] = 5' },
    { id: 20, type: "Комментарии", bad: 'print("Hi") // comment', good: 'print("Hi") # comment' },

    // --- Продвинутый уровень (21-50) ---
    { id: 21, type: "Исключения", bad: 'try:\n    x=1/0\ncatch:\n    pass', good: 'try:\n    x=1/0\nexcept:\n    pass' },
    { id: 22, type: "Функции", bad: 'def add(a,b):\n    a+b', good: 'def add(a,b):\n    return a+b' },
    { id: 23, type: "ООП", bad: 'class A:\n    def hello():\n        pass', good: 'class A:\n    def hello(self):\n        pass' },
    { id: 24, type: "Создание объекта", bad: 'a = new A()', good: 'a = A()' },
    { id: 25, type: "Lambda", bad: 'f = lambda x: return x', good: 'f = lambda x: x' },
    { id: 26, type: "Set", bad: 's = {}\ns.add(1)', good: 's = set()\ns.add(1)' },
    { id: 27, type: "Файлы", bad: 'f = open("a.txt")\nf.write("x")', good: 'f = open("a.txt","w")\nf.write("x")' },
    { id: 28, type: "with", bad: 'with open("a.txt") as f\n    pass', good: 'with open("a.txt") as f:\n    pass' },
    { id: 29, type: "List", bad: 'a = [x for x in range(3):]', good: 'a = [x for x in range(3)]' },
    { id: 30, type: "Сравнение", bad: 'if x = True:\n    pass', good: 'if x == True:\n    pass' },
    { id: 31, type: "Ключи", bad: 'd = {[1]:2}', good: 'd = {(1,):2}' },
    { id: 32, type: "F-string", bad: 'name="Ann"\nprint(f"{Name}")', good: 'name="Ann"\nprint(f"{name}")' },
    { id: 33, type: "Логика", bad: 'if x>1 and or x<5:\n    pass', good: 'if x>1 or x<5:\n    pass' },
    { id: 34, type: "Имя", bad: '2var = 10', good: 'var2 = 10' },
    { id: 35, type: "Словарь", bad: 'u={"n":"A"}\nprint(u.n)', good: 'u={"n":"A"}\nprint(u["n"])' },
    { id: 36, type: "Глобальные", bad: 'x=0\ndef f():\n    x+=1', good: 'x=0\ndef f():\n    global x\n    x+=1' },
    { id: 37, type: "Типы", bad: 'int("5.2")', good: 'float("5.2")' },
    { id: 38, type: "Инкремент", bad: 'i=1\ni++', good: 'i=1\ni+=1' },
    { id: 39, type: "Метод", bad: 's="a"\nprint(s.upper)', good: 's="a"\nprint(s.upper())' },
    { id: 40, type: "Распаковка", bad: 'a,b=[1,2,3]', good: 'a,b,c=[1,2,3]' },
    { id: 41, type: "Join", bad: '"-".join(1,2)', good: '"-".join(["1","2"])' },
    { id: 42, type: "Индекс", bad: 'a=[1]\nprint(a[2])', good: 'a=[1]\nprint(a[0])' },
    { id: 43, type: "Копия", bad: 'a=[1]\nb=a\nb.append(2)', good: 'a=[1]\nb=a.copy()\nb.append(2)' },
    { id: 44, type: "Декоратор", bad: '@d\ndef f:\n    pass', good: '@d\ndef f():\n    pass' },
    { id: 45, type: "Тернарный", bad: 'x=1 if True else x=2', good: 'x=1 if True else 2' },
    { id: 46, type: "Continue", bad: 'for i in range(3):\n    if i==1:\n        pass', good: 'for i in range(3):\n    if i==1:\n        continue' },
    { id: 47, type: "Аргументы", bad: 'def f(a=1,b):\n    pass', good: 'def f(b,a=1):\n    pass' },
    { id: 48, type: "None", bad: 'if x == None:\n    pass', good: 'if x is None:\n    pass' },
    { id: 49, type: "Список", bad: 'def f(l=[]):\n    l.append(1)', good: 'def f(l=None):\n    if l is None:\n        l=[]\n    l.append(1)' },
    { id: 50, type: "Класс", bad: 'class A:\n    def init(self):\n        pass', good: 'class A:\n    def __init__(self):\n        pass' }
];
    let solvedIds = [];

    // Загрузка прогресса
    function loadProgress() {
        const saved = localStorage.getItem('python_debug_progress');
        if (saved) {
            solvedIds = JSON.parse(saved);
            updateScoreUI();
        }
    }

    // Сохранение прогресса
    function saveProgress() {
        localStorage.setItem('python_debug_progress', JSON.stringify(solvedIds));
    }

    function updateScoreUI() {
        document.getElementById('score-counter').textContent = `${solvedIds.length} / ${tasks.length}`;
    }

    function normalize(code) {
        return code.trim().replace(/\s+/g, '').replace(/'/g, '"');
    }

    function render() {
        const container = document.getElementById('tasks-container');
        tasks.forEach(task => {
            const isSolved = solvedIds.includes(task.id);
            const card = document.createElement('div');
            card.className = `task-card ${isSolved ? 'success' : ''}`;
            card.id = `card-${task.id}`;
            card.innerHTML = `
                <div class="task-header">
                    <span>Задание #${task.id} (${task.type})</span>
                    <span class="status-badge ${isSolved ? 'correct' : ''}" id="status-${task.id}">
                        ${isSolved ? 'РЕШЕНО' : 'ОЖИДАНИЕ'}
                    </span>
                </div>
                <div class="workspace">
                    <pre>${task.bad}</pre>
                    <textarea id="input-${task.id}" ${isSolved ? 'disabled' : ''} placeholder="Исправьте код...">${isSolved ? task.good : ''}</textarea>
                </div>
                <button class="btn" id="btn-${task.id}" ${isSolved ? 'disabled' : ''} onclick="check(${task.id})">Проверить</button>
            `;
            container.appendChild(card);
        });
    }

    window.check = function(id) {
        const task = tasks.find(t => t.id === id);
        const input = document.getElementById(`input-${id}`).value;
        
        if (normalize(input) === normalize(task.good)) {
            solvedIds.push(id);
            document.getElementById(`card-${id}`).classList.add('success');
            document.getElementById(`status-${id}`).textContent = 'ВЕРНО';
            document.getElementById(`status-${id}`).classList.add('correct');
            document.getElementById(`btn-${id}`).disabled = true;
            document.getElementById(`input-${id}`).disabled = true;
            saveProgress();
            updateScoreUI();
        } else {
            alert('Ошибка в коде. Попробуй еще раз!');
        }
    };

    // Отправка в VK через ваш Backend
    document.getElementById('results-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        const data = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            score: solvedIds.length
        };

        btn.disabled = true;
        btn.textContent = 'ОТПРАВКА...';

        try {
            // ЗАМЕНИТЕ URL на адрес вашего запущенного Python-сервера
            const response = await fetch('https://bot-b3yt.onrender.com/send_to_vk', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert('Результаты успешно отправлены учителю!');
            } else {
                throw new Error();
            }
        } catch (err) {
            alert('Ошибка отправки. Убедитесь, что Python-сервер запущен.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'ОТПРАВИТЬ В VK';
        }
    };

    loadProgress();
    render();
</script>
</body>
</html>
